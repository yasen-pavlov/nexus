host: localhost:8080
info:
  contact: {}
  description: Personal search and RAG tool — indexes data from multiple sources and
    provides unified search.
  title: Nexus API
  version: "1.0"
paths:
  /admin/stats:
    get:
      description: Aggregates document counts, cache footprint, and engine configuration
        for the admin dashboard. Admin only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.AdminStats'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: System-wide statistics
      tags:
      - settings
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.authResponse'
        "400":
          description: invalid credentials
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      summary: Login
      tags:
      - auth
  /auth/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.userResponse'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Only available when no users exist. Creates the first user as admin.
      parameters:
      - description: Credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api.authResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "403":
          description: Registration disabled
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      summary: Register first admin user
      tags:
      - auth
  /connectors:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api.connectorResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List all connectors
      tags:
      - connectors
    post:
      consumes:
      - application/json
      parameters:
      - description: Connector config
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.createConnectorRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_muty_nexus_internal_model.ConnectorConfig'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "409":
          description: Name already exists
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Create a new connector
      tags:
      - connectors
  /connectors/{id}:
    delete:
      parameters:
      - description: Connector UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete a connector
      tags:
      - connectors
    get:
      parameters:
      - description: Connector UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.connectorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Get a connector by ID
      tags:
      - connectors
    put:
      consumes:
      - application/json
      description: Updates connector config. Masked secret values (****...) are preserved
        from the existing config.
      parameters:
      - description: Connector UUID
        in: path
        name: id
        required: true
        type: string
      - description: Updated config
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.updateConnectorRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_muty_nexus_internal_model.ConnectorConfig'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "409":
          description: Name already exists
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Update a connector
      tags:
      - connectors
  /connectors/{id}/auth/code:
    post:
      consumes:
      - application/json
      description: Completes Telegram authentication by submitting the code received
        in the Telegram app.
      parameters:
      - description: Connector UUID
        in: path
        name: id
        required: true
        type: string
      - description: Auth code
        in: body
        name: request
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Submit Telegram auth code
      tags:
      - connectors
  /connectors/{id}/auth/start:
    post:
      description: Initiates the Telegram MTProto auth flow. Sends a code to the user's
        Telegram app.
      parameters:
      - description: Connector UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Start Telegram authentication
      tags:
      - connectors
  /connectors/{id}/avatars/{external_id}:
    get:
      description: Streams the bytes of a profile photo the connector cached to the
        binary store (e.g. a Telegram sender's avatar, keyed by their external user
        ID). Auth-scoped to the connector's visibility; returns 404 (not 403) for
        connectors the caller can't read, to avoid leaking existence. Emits a private,
        caches-fine response so the browser reuses the blob across conversation views.
      parameters:
      - description: Connector UUID
        in: path
        name: id
        required: true
        type: string
      - description: External (source-assigned) identifier whose avatar to fetch
        in: path
        name: external_id
        required: true
        type: string
      produces:
      - image/*
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Fetch a cached profile avatar from a connector
      tags:
      - connectors
  /connectors/{id}/runs:
    get:
      description: Returns the most recent sync runs (newest first) for a connector.
        Used by the Activity timeline tab. Limit is clamped to 1..200 with default
        50.
      parameters:
      - description: Connector UUID
        in: path
        name: id
        required: true
        type: string
      - description: Max rows to return (default 50, max 200)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_muty_nexus_internal_model.SyncRun'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: List sync run history for a connector
      tags:
      - sync
  /conversations/{source_type}/{conversation_id}/messages:
    get:
      description: Returns Hidden=true per-message documents for a (source_type, conversation_id)
        pair sorted by created_at ASC. Supports cursor pagination via `before` / `after`
        RFC3339 timestamps, plus `around=RFC3339` for anchor-seeded opens (returns
        half the limit older + half newer, centered on the anchor). Chat-like connectors
        (Telegram today, WhatsApp / Signal / Matrix in the future) plug in by emitting
        their per-message canonical docs with matching ConversationID.
      parameters:
      - description: Connector source type (e.g. telegram)
        in: path
        name: source_type
        required: true
        type: string
      - description: Conversation identifier (e.g. Telegram chat ID)
        in: path
        name: conversation_id
        required: true
        type: string
      - description: RFC3339 timestamp — return messages strictly before this time
        in: query
        name: before
        type: string
      - description: RFC3339 timestamp — return messages strictly after this time
        in: query
        name: after
        type: string
      - description: RFC3339 timestamp — return limit/2 messages before and limit/2
          after, centered on this time. Cannot be combined with before/after.
        in: query
        name: around
        type: string
      - description: Page size (default 50, max 200)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.conversationMessagesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Paginated chronological browse of a conversation
      tags:
      - conversations
  /documents/{id}/content:
    get:
      description: Streams the original bytes of a document. Dispatches to the source
        connector via the BinaryFetcher capability. Returns 404 if the connector does
        not support previews or if the user lacks read permission. Use ?download=1
        to force an attachment disposition instead of inline rendering.
      parameters:
      - description: Document UUID
        in: path
        name: id
        required: true
        type: string
      - description: Set to '1' to force attachment disposition
        in: query
        name: download
        type: string
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Download or preview a document's binary content
      tags:
      - documents
  /documents/{id}/related:
    get:
      description: 'Returns the neighbors of a document across all relation types.
        `outgoing` edges are the ones declared on the doc itself (attachment_of, reply_to,
        member_of_thread, member_of_window); `incoming` edges are the reverse lookup
        — other docs that point at this one. Dangling edges (target not in index)
        are returned with `document: null`.'
      parameters:
      - description: Document UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.relatedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Resolve typed relations (attachments, replies, threads) for a document
      tags:
      - documents
  /documents/by-source:
    get:
      description: 'Resolves a chunk identified by its canonical per-connector identifiers
        into a Document. Used by the conversation view to lazy-fetch reply targets
        whose message falls outside the loaded window — when walking a reply_to relation
        the frontend only has the target''s source identifiers and needs to fetch
        the full doc. Auth-scoped: returns 404 (not 403) when the doc isn''t readable,
        to avoid leaking existence.'
      parameters:
      - description: Source type (e.g. telegram, imap)
        in: query
        name: source_type
        required: true
        type: string
      - description: Source-assigned identifier of the chunk
        in: query
        name: source_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_muty_nexus_internal_model.Document'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Look up a document by (source_type, source_id)
      tags:
      - documents
  /health:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - system
  /me/identities:
    get:
      description: Returns the requesting user's external identities on each of their
        *owned* connectors (shared connectors are skipped — they don't represent "me").
        Only connectors that have completed auth and populated `external_id` emit
        an entry. Chat-like UI uses this to distinguish own messages from others.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.identitiesResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: List self-identities across connected sources
      tags:
      - identity
  /reindex:
    post:
      description: Recreates the OpenSearch index with the current embedding dimension,
        clears all sync cursors, and triggers a full sync for all enabled connectors.
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Full re-index
      tags:
      - sync
  /search:
    get:
      description: Performs hybrid search (BM25 + vector) if embeddings are enabled,
        otherwise BM25-only.
      parameters:
      - description: Search query
        in: query
        name: q
        required: true
        type: string
      - description: Max results (default 20)
        in: query
        name: limit
        type: integer
      - description: Pagination offset
        in: query
        name: offset
        type: integer
      - description: Filter by source types (comma-separated)
        in: query
        name: sources
        type: string
      - description: Filter by source names (comma-separated)
        in: query
        name: source_names
        type: string
      - description: Filter by date (YYYY-MM-DD)
        in: query
        name: date_from
        type: string
      - description: Filter by date (YYYY-MM-DD)
        in: query
        name: date_to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_muty_nexus_internal_model.SearchResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Search across all indexed documents
      tags:
      - search
  /settings/embedding:
    get:
      description: Returns current embedding provider configuration. API keys are
        masked.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.embeddingSettingsResponse'
      security:
      - BearerAuth: []
      summary: Get embedding settings
      tags:
      - settings
    put:
      consumes:
      - application/json
      description: Updates the embedding provider. If provider or model changes, automatically
        triggers a full re-index. Masked API keys (****...) are preserved.
      parameters:
      - description: Embedding settings
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.embeddingSettingsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.embeddingSettingsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Update embedding settings
      tags:
      - settings
  /settings/ranking:
    get:
      description: Returns the active ranking config — per-source half-life + floor
        + trust weight, plus the global bonus/trust toggles. Admin only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.rankingSettings'
      security:
      - BearerAuth: []
      summary: Get search ranking tunables
      tags:
      - settings
    put:
      consumes:
      - application/json
      description: Persists ranking knobs and hot-swaps them into the in-memory config
        so the next query sees the new values. Unknown source_type keys in any of
        the per-source maps are rejected with 400. Admin only.
      parameters:
      - description: Ranking settings
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.rankingSettings'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.rankingSettings'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Update search ranking tunables
      tags:
      - settings
  /settings/rerank:
    get:
      description: Returns current reranking provider configuration + the min-score
        floor. API keys are masked.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.rerankSettingsResponse'
      security:
      - BearerAuth: []
      summary: Get rerank settings
      tags:
      - settings
    put:
      consumes:
      - application/json
      description: Updates the reranking provider + min-score floor. Masked API keys
        (****...) are preserved. min_score must be in [0,1].
      parameters:
      - description: Rerank settings
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.rerankSettingsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.rerankSettingsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Update rerank settings
      tags:
      - settings
  /settings/retention:
    get:
      description: Returns the currently-persisted retention policy. Admin only. Reports
        the hard floor on sweep interval so the UI can surface it as a disabled bound
        instead of letting the user submit an invalid value.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.retentionSettingsResponse'
      security:
      - BearerAuth: []
      summary: Get sync-history retention settings
      tags:
      - settings
    put:
      consumes:
      - application/json
      description: Validates and persists the three retention keys the sweeper reads
        every tick. Retention values must be non-negative integers (0 disables the
        rule). The sweep interval is clamped to the hard floor reported by GET.
      parameters:
      - description: Retention settings
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.retentionSettingsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_api.retentionSettingsResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Update sync-history retention settings
      tags:
      - settings
  /settings/retention/sweep:
    post:
      description: Triggers a one-shot sweep of the sync_runs history using the currently-persisted
        retention rules. Admin only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Run retention cleanup immediately
      tags:
      - settings
  /storage/cache:
    delete:
      description: Deletes every cached blob across all connectors. Admin only. Eager-cached
        data (Telegram) will be re-populated on next sync only if the upstream media
        is still available; use with care.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Wipe the entire binary cache
      tags:
      - settings
  /storage/cache/{id}:
    delete:
      description: Deletes every cached blob for the connector identified by path
        ID. Admin only. Safe for lazy-mode connectors — they'll repopulate the cache
        on next preview. Eager-mode connectors lose cached data that may not be re-fetchable
        if the upstream source has expired.
      parameters:
      - description: Connector UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Wipe the binary cache for a single connector
      tags:
      - settings
  /storage/stats:
    get:
      description: Returns per-source-type/name aggregates of cached binaries (count,
        total bytes). Admin only.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/internal_api.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_muty_nexus_internal_model.BinaryStoreStats'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Binary cache stats per connector
      tags:
      - settings
  /sync:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api.SyncJob'
            type: array
      security:
      - BearerAuth: []
      summary: List active and recent sync jobs
      tags:
      - sync
    post:
      description: Starts async sync jobs for all enabled connectors. Skips connectors
        that are already syncing.
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            items:
              $ref: '#/definitions/internal_api.SyncJob'
            type: array
      security:
      - BearerAuth: []
      summary: Sync all enabled connectors
      tags:
      - sync
  /sync/{id}:
    post:
      description: Starts an async sync job. Returns immediately with the job state.
      parameters:
      - description: Connector UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_api.SyncJob'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "409":
          description: Sync already running
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Trigger sync for a single connector
      tags:
      - sync
  /sync/{id}/progress:
    get:
      description: 'Opens a Server-Sent Events stream that pushes SyncJob updates
        in real-time. Sends an "event: done" when the job completes.'
      parameters:
      - description: Connector UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Stream sync progress via SSE
      tags:
      - sync
  /sync/cursors:
    delete:
      description: Clears all sync cursors, forcing a full re-sync on next trigger.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete all sync cursors
      tags:
      - sync
  /sync/cursors/{id}:
    delete:
      parameters:
      - description: Connector UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete a single connector's sync cursor
      tags:
      - sync
  /sync/jobs/{id}/cancel:
    post:
      description: 'Signals the job''s context to cancel. Fire-and-forget: returns
        202 immediately. The client learns the terminal state via the SSE progress
        stream. Idempotent — canceling an already-canceled or completed job returns
        202.'
      parameters:
      - description: Job UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Cancel a running sync job
      tags:
      - sync
  /sync/progress:
    get:
      description: 'Multiplexed Server-Sent Events stream: one connection pushes SyncJob
        updates for every job the caller can read. Replaces per-job /sync/{id}/progress.
        Auth accepts either the standard Authorization header or a sse_token query
        param (required for browser EventSource, which cannot set headers). Sends
        a heartbeat comment every 15s to keep reverse proxies from closing the connection.'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE stream
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Stream live sync progress across all visible connectors via SSE
      tags:
      - sync
  /users:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/internal_api.userResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List all users (admin only)
      tags:
      - users
    post:
      consumes:
      - application/json
      parameters:
      - description: User details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.createUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_api.userResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "409":
          description: Username taken
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Create a new user (admin only)
      tags:
      - users
  /users/{id}:
    delete:
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Delete a user (admin only)
      tags:
      - users
  /users/{id}/password:
    put:
      consumes:
      - application/json
      parameters:
      - description: User UUID
        in: path
        name: id
        required: true
        type: string
      - description: New password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api.changePasswordRequest'
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_api.APIResponse'
      security:
      - BearerAuth: []
      summary: Change user password (admin or self)
      tags:
      - users
securityDefinitions:
  BearerAuth:
    description: Type "Bearer " followed by the JWT returned from /auth/login.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
