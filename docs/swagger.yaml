basePath: /api
definitions:
  github_com_muty_nexus_internal_model.BinaryStoreStats:
    properties:
      count:
        type: integer
      source_name:
        type: string
      source_type:
        type: string
      total_size:
        type: integer
    type: object
  github_com_muty_nexus_internal_model.ConnectorConfig:
    properties:
      config:
        additionalProperties: {}
        type: object
      created_at:
        type: string
      enabled:
        type: boolean
      external_id:
        description: |-
          ExternalID and ExternalName identify who the Nexus user IS on the
          external system this connector represents (e.g. own Telegram user
          ID + display name after OAuth). Empty when the connector has no
          notion of "self" (filesystem) or hasn't completed auth yet. Used
          by the /api/me/identities endpoint to drive self-aware UI.
        type: string
      external_name:
        type: string
      id:
        type: string
      last_run:
        type: string
      name:
        type: string
      schedule:
        type: string
      shared:
        type: boolean
      type:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  github_com_muty_nexus_internal_model.Document:
    properties:
      content:
        type: string
      conversation_id:
        type: string
      created_at:
        type: string
      hidden:
        type: boolean
      id:
        type: string
      imap_message_id:
        type: string
      indexed_at:
        type: string
      metadata:
        additionalProperties: {}
        type: object
      mime_type:
        type: string
      relations:
        items:
          $ref: '#/definitions/github_com_muty_nexus_internal_model.Relation'
        type: array
      size:
        type: integer
      source_id:
        type: string
      source_name:
        type: string
      source_type:
        type: string
      title:
        type: string
      url:
        type: string
      visibility:
        type: string
    type: object
  github_com_muty_nexus_internal_model.DocumentHit:
    properties:
      content:
        type: string
      conversation_id:
        type: string
      created_at:
        type: string
      headline:
        type: string
      hidden:
        type: boolean
      id:
        type: string
      imap_message_id:
        type: string
      indexed_at:
        type: string
      match_avatar_key:
        type: string
      match_created_at:
        type: string
      match_message_id:
        type: integer
      match_sender_id:
        type: integer
      match_sender_name:
        type: string
      match_source_id:
        description: |-
          Match* fields pinpoint the specific message inside a
          conversation-window document that matched the query. Populated
          by the search pipeline when a BM25 highlight can be mapped back
          to a message_lines entry (telegram window hits today). Empty
          for semantic-only hits and for non-window documents — the
          frontend renders a bookended window preview in those cases
          instead of a pinpoint message card.
        type: string
      metadata:
        additionalProperties: {}
        type: object
      mime_type:
        type: string
      rank:
        type: number
      related_count:
        description: |-
          RelatedCount is the total number of relations — outgoing (on this doc's
          `relations`) plus incoming (other docs referencing this one). The
          frontend uses this to hide the "Related" toggle for docs with nothing
          to expand, without triggering an extra /related call per hit.
        type: integer
      relations:
        items:
          $ref: '#/definitions/github_com_muty_nexus_internal_model.Relation'
        type: array
      score_details:
        $ref: '#/definitions/github_com_muty_nexus_internal_model.ScoreDetails'
      size:
        type: integer
      source_id:
        type: string
      source_name:
        type: string
      source_type:
        type: string
      title:
        type: string
      url:
        type: string
      visibility:
        type: string
    type: object
  github_com_muty_nexus_internal_model.Facet:
    properties:
      count:
        type: integer
      value:
        type: string
    type: object
  github_com_muty_nexus_internal_model.Relation:
    properties:
      target_id:
        type: string
      target_source_id:
        type: string
      type:
        type: string
    type: object
  github_com_muty_nexus_internal_model.ScoreDetails:
    properties:
      final:
        type: number
      metadata_bonus:
        type: number
      recency_factor:
        type: number
      reranker:
        type: number
      retrieval:
        type: number
    type: object
  github_com_muty_nexus_internal_model.SearchResult:
    properties:
      documents:
        items:
          $ref: '#/definitions/github_com_muty_nexus_internal_model.DocumentHit'
        type: array
      facets:
        additionalProperties:
          items:
            $ref: '#/definitions/github_com_muty_nexus_internal_model.Facet'
          type: array
        type: object
      query:
        type: string
      total_count:
        type: integer
    type: object
  github_com_muty_nexus_internal_model.SyncRun:
    properties:
      completed_at:
        type: string
      connector_id:
        type: string
      docs_deleted:
        type: integer
      docs_processed:
        type: integer
      docs_total:
        type: integer
      error_message:
        type: string
      errors:
        type: integer
      id:
        type: string
      started_at:
        type: string
      status:
        type: string
    type: object
  internal_api.APIResponse:
    properties:
      data: {}
      error:
        type: string
    type: object
  internal_api.AdminEngineStats:
    properties:
      dimension:
        type: integer
      enabled:
        type: boolean
      model:
        type: string
      provider:
        type: string
    type: object
  internal_api.AdminPerSourceStats:
    properties:
      cache_bytes:
        type: integer
      cache_count:
        type: integer
      chunk_count:
        type: integer
      document_count:
        type: integer
      first_indexed_at:
        type: string
      latest_indexed_at:
        type: string
      source_name:
        type: string
      source_type:
        type: string
    type: object
  internal_api.AdminStats:
    properties:
      embedding:
        $ref: '#/definitions/internal_api.AdminEngineStats'
      per_source:
        items:
          $ref: '#/definitions/internal_api.AdminPerSourceStats'
        type: array
      rerank:
        $ref: '#/definitions/internal_api.AdminEngineStats'
      total_chunks:
        type: integer
      total_documents:
        type: integer
      users_count:
        type: integer
    type: object
  internal_api.SyncJob:
    properties:
      completed_at:
        type: string
      connector_id:
        type: string
      connector_name:
        type: string
      connector_type:
        type: string
      docs_deleted:
        type: integer
      docs_processed:
        type: integer
      docs_total:
        type: integer
      error:
        type: string
      errors:
        type: integer
      id:
        type: string
      started_at:
        type: string
      status:
        description: running | completed | failed | canceled
        type: string
    type: object
  internal_api.authResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/internal_api.userResponse'
    type: object
  internal_api.changePasswordRequest:
    properties:
      password:
        type: string
    type: object
  internal_api.connectorResponse:
    properties:
      config:
        additionalProperties: {}
        type: object
      created_at:
        type: string
      enabled:
        type: boolean
      external_id:
        description: |-
          ExternalID and ExternalName identify who the Nexus user IS on the
          external system this connector represents (e.g. own Telegram user
          ID + display name after OAuth). Empty when the connector has no
          notion of "self" (filesystem) or hasn't completed auth yet. Used
          by the /api/me/identities endpoint to drive self-aware UI.
        type: string
      external_name:
        type: string
      id:
        type: string
      last_run:
        type: string
      name:
        type: string
      schedule:
        type: string
      shared:
        type: boolean
      status:
        type: string
      type:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  internal_api.conversationMessagesResponse:
    properties:
      messages:
        items:
          $ref: '#/definitions/github_com_muty_nexus_internal_model.Document'
        type: array
      next_after:
        type: string
      next_before:
        type: string
    type: object
  internal_api.createConnectorRequest:
    properties:
      config:
        additionalProperties: {}
        type: object
      enabled:
        type: boolean
      name:
        type: string
      schedule:
        type: string
      shared:
        type: boolean
      type:
        type: string
    type: object
  internal_api.createUserRequest:
    properties:
      password:
        type: string
      role:
        type: string
      username:
        type: string
    type: object
  internal_api.embeddingSettingsRequest:
    properties:
      api_key:
        type: string
      model:
        type: string
      ollama_url:
        type: string
      provider:
        type: string
    type: object
  internal_api.embeddingSettingsResponse:
    properties:
      api_key:
        type: string
      model:
        type: string
      ollama_url:
        type: string
      provider:
        type: string
    type: object
  internal_api.identitiesResponse:
    properties:
      identities:
        items:
          $ref: '#/definitions/internal_api.identityItem'
        type: array
    type: object
  internal_api.identityItem:
    properties:
      connector_id:
        type: string
      external_id:
        type: string
      external_name:
        type: string
      has_avatar:
        type: boolean
      source_name:
        type: string
      source_type:
        type: string
