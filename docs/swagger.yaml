      source_recency_floor:
        additionalProperties:
          type: number
        type: object
      source_trust_enabled:
        type: boolean
      source_trust_weight:
        additionalProperties:
          type: number
        type: object
    type: object
  internal_api.registerRequest:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  internal_api.relatedEdge:
    properties:
      document:
        $ref: '#/definitions/github_com_muty_nexus_internal_model.Document'
      relation:
        $ref: '#/definitions/github_com_muty_nexus_internal_model.Relation'
