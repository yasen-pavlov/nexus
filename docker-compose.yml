services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 3s
      retries: 5

  nexus:
    build: .
    ports:
      - "8080:8080"
    environment:
      NEXUS_DATABASE_URL: postgres://nexus:nexus@db:5432/nexus?sslmode=disable
      NEXUS_FS_ROOT_PATH: /data
      NEXUS_FS_PATTERNS: "*.txt,*.md"
    volumes:
      - ./testdata:/data:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
