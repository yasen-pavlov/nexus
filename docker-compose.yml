services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 3s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms256m -Xmx256m
    volumes:
      - osdata:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  tika:
    image: apache/tika:latest-full
    ports:
      - "9998:9998"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9998/tika"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  nexus:
    build: .
    ports:
      - "8080:8080"
    environment:
      NEXUS_DATABASE_URL: postgres://nexus:nexus@db:5432/nexus?sslmode=disable
      NEXUS_OPENSEARCH_URL: http://opensearch:9200
      NEXUS_TIKA_URL: http://tika:9998
      NEXUS_FS_ROOT_PATH: /data
      NEXUS_FS_PATTERNS: "*.txt,*.md,*.pdf,*.docx,*.xlsx,*.pptx,*.doc,*.xls,*.jpg,*.png"
      # Embedding configured via Settings UI, or uncomment for env var override:
      # NEXUS_EMBEDDING_PROVIDER: ollama
      # NEXUS_OLLAMA_URL: http://ollama:11434
      # For API providers instead:
      # NEXUS_EMBEDDING_PROVIDER: openai
      # NEXUS_EMBEDDING_API_KEY: sk-...
    volumes:
      - ./testdata:/data:ro
    depends_on:
      db:
        condition: service_healthy
      opensearch:
        condition: service_healthy

volumes:
  pgdata:
  osdata:
  ollama-data:
