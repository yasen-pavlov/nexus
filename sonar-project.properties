sonar.projectKey=yasen-pavlov_nexus
sonar.organization=yasen-pavlov

# Sources / tests — split out so Sonar classifies production vs. test code
# correctly. Coverage reports cover both halves; rules are scoped accordingly.
# `migrations/` is deliberately NOT in sources: SonarCloud's PL/SQL analyzer
# picks up every `.sql` file it can see and emits an Oracle Data Dictionary
# warning on every scan, even though our migrations are Postgres SQL. Goose
# migrations are immutable history anyway — they shouldn't be subject to
# code-quality rules.
sonar.sources=cmd,internal,web/src
sonar.tests=internal,web/src
sonar.test.inclusions=**/*_test.go,**/*.test.ts,**/*.test.tsx,**/e2e/**
sonar.exclusions=\
  **/*_test.go,\
  **/testutil/**,\
  **/mocks/**,\
  **/*.gen.ts,\
  web/src/routeTree.gen.ts,\
  web/src/lib/api-schema.ts,\
  web/dist/**,\
  web/coverage/**,\
  web/playwright-report/**,\
  web/test-results/**,\
  internal/api/static/dist/**

# Coverage — paths match the artifacts downloaded in the Sonar CI job.
sonar.go.coverage.reportPaths=coverage.out
sonar.javascript.lcov.reportPaths=web/coverage/combined/lcov.info
sonar.typescript.lcov.reportPaths=web/coverage/combined/lcov.info

# Coverage-exclusions — files that ship but aren't meaningful to cover
# (entry points, generated code, migration SQL, vendored/static assets).
sonar.coverage.exclusions=\
  cmd/**,\
  **/*.gen.ts,\
  web/src/routeTree.gen.ts,\
  web/src/lib/api-schema.ts,\
  web/src/main.tsx,\
  web/src/router.tsx,\
  web/src/vite-env.d.ts,\
  internal/api/static/**

sonar.sourceEncoding=UTF-8

# Rule-specific ignores. Applied via multicriteria so each entry is
# reviewable at a glance.
sonar.issue.ignore.multicriteria=e1,e2,e3

# Test code is allowed higher cognitive complexity than production: table-
# driven tests inherently branch a lot (scenario setup + per-case asserts),
# and Sonar's default threshold of 15 is calibrated for shipped code. We
# keep S3776 on production Go code to keep real hotspots visible.
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go

# Constructor parameter counts (S107). NewRouter / NewSyncRunStore and the
# telegram connector helpers take many dependencies by design; refactoring
# to a config struct is a deliberate design call, not a Sonar-driven bulk
# edit. Re-enable once we decide on the DI pattern across the repo.
sonar.issue.ignore.multicriteria.e2.ruleKey=go:S107
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.go

# The `string & {}` intersection (S4335) is a known TypeScript idiom for
# preserving literal autocomplete on open-enum types — a LiteralUnion as
# popularised by type-fest. It's semantically `string` but blocks TS from
# collapsing the union. Sonar's "empty intersection" rule doesn't know
# about the idiom; scope the ignore to api-types.ts where we use it.
sonar.issue.ignore.multicriteria.e3.ruleKey=typescript:S4335
sonar.issue.ignore.multicriteria.e3.resourceKey=web/src/lib/api-types.ts
