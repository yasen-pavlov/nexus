name: Release

on:
  push:
    tags: ["v*"]
  # Manual dry-run: lets us verify the cross-compile fits the runner
  # (and picks up any other regressions) on a branch without publishing
  # a real release. Invoked as `gh workflow run release.yml --ref <branch>`.
  workflow_dispatch:

jobs:
  goreleaser:
    name: Binaries + GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # goreleaser wants the full history for changelog

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      # Serialize the cross-compile. The hosted runner has ~16 GB of RAM
      # but goreleaser's default parallelism (GOMAXPROCS = 4 on this
      # runner) runs four Go cross-compiles simultaneously — between the
      # Go toolchain working set, cached node_modules, and the linker
      # phase, that tips over the runner and we get a silent kill with
      # no further log output. `--parallelism 1` costs a few extra
      # minutes per release but keeps the run deterministic.
      #
      # On manual dispatch, use `build --snapshot` instead of `release` so
      # we don't create a GitHub Release / upload artifacts — just
      # exercises the full cross-compile path to verify it fits.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: >-
            ${{ github.event_name == 'workflow_dispatch'
                && 'build --clean --snapshot --parallelism 1'
                || 'release --clean --parallelism 1' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
