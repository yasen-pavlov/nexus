name: Release

on:
  push:
    tags: ["v*"]

jobs:
  goreleaser:
    name: Binaries + GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # goreleaser wants the full history for changelog

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true

      # Serialize the cross-compile. The hosted runner has ~7 GB of RAM;
      # Go's toolchain for Nexus weighs in at ~1.5 GB peak per target, and
      # goreleaser's default parallelism (GOMAXPROCS, 4 on this runner)
      # runs four targets simultaneously, which reliably OOMs now that the
      # codebase has grown. `--parallelism 1` costs us a few extra minutes
      # but keeps the release deterministic.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --parallelism 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
